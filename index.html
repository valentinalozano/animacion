<!DOCTYPE html>
<html lang="es">
<head>
    <link href="logo.ico" rel="icon"
    <title>animacion</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- ANIMACION -->
    <div class="stroke"></div>

    <!-- TABLA -->
    <table>
        <tr>
            <th>Vuelo</th>
            <th>Origen</th>
            <th>Destino</th>
            <th>Fechas</th>
        </tr>
        <tr>
            <td>229788</td>
            <td>Cd. Juarez</td>
            <td>Madrid</td>
            <td>24/12/2026</td>
        </tr>
        <tr>
            <td>242521</td>
            <td>Cd. Juarez</td>
            <td>Madrid</td>
            <td>24/12/2026</td>
        </tr>
    </table>

    <!-- DISPLAY -->
    <p class="titulo">Display: block</p>
    <div class="block">Caja 1</div>
    <div class="block">Caja 2</div>

    <p class="titulo">Display: inline</p>

    <div class="inline">
       <img src="img/tepic.png" alt="tepic">
    </div>

    <div class="inline">
        <img src="img/oaxaca.png" alt="oaxaca">
    </div>

    <div class="inline">
        <img src="img/manzanillo.png" alt="manzanillo">
    </div>

    <p class="titulo">Display: inline-block</p>
    <div class="inline-block">Caja 1</div>
    <div class="inline-block">Caja 2</div>
    <div class="inline-block">Caja 3</div>

    <!-- CUADROS LOGO AREOMEXICO -->
    <div class="roja">
        <img src="img/aeromexicouno.png" alt="Aeromexico">
    </div>

    <div class="azul">
        <img src="img/aeromexicodos.png" alt="Aeromexico">
    </div>

</body>
</html>
